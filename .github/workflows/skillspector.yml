name: skillspector

# Advisory SkillSpector scan. Runs on demand only and never blocks a merge:
# it doesn't run on `pull_request`, and every scan job exits 0 regardless of
# findings. The static scan (`--no-llm`) is high-recall / moderate-precision,
# so its raw findings are reported, not gated on.
#
# Findings go to the job summary and artifacts. The allowlist and gate script
# only classify findings (allowlisted vs. un-allowlisted HIGH/CRITICAL); they
# do not fail the build.
#
# This workflow exposes no required status check; don't mark it required in
# branch protection.

on:
  workflow_dispatch:
    inputs:
      skill:
        description: "Scan only this skill (directory name under skills/). Leave blank to scan all."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  # Enumerate skills for the scan matrix, filtering to one skill if requested.
  discover-skills:
    name: Discover skills
    runs-on: ubuntu-latest
    outputs:
      skills: ${{ steps.discover.outputs.skills }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: List skills
        id: discover
        env:
          ONLY_SKILL: ${{ inputs.skill }}
        run: |
          set -euo pipefail
          all="$(uv run .github/scripts/validate_skills.py --list)"
          if [ -n "${ONLY_SKILL}" ]; then
            filtered="$(echo "$all" | jq -c --arg s "$ONLY_SKILL" '[.[] | select(. == $s)]')"
            if [ "$(echo "$filtered" | jq 'length')" = "0" ]; then
              echo "::error::Requested skill '${ONLY_SKILL}' not found under skills/. Available: $all"
              exit 1
            fi
            echo "skills=$filtered" >> "$GITHUB_OUTPUT"
          else
            echo "skills=$all" >> "$GITHUB_OUTPUT"
          fi

  scan-skill:
    name: Scan skill (advisory)
    needs: discover-skills
    runs-on: ubuntu-latest
    strategy:
      # Keep scanning the other skills even if one has findings.
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.discover-skills.outputs.skills) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      # SkillSpector is pinned to a commit for reproducibility; bump the SHA to
      # update. Advisory: this step always exits 0 and only reports findings.
      - name: Scan skill with SkillSpector
        run: |
          mkdir -p reports
          report="reports/${{ matrix.skill }}.md"

          set +e
          uvx --python 3.12 \
            --from "git+https://github.com/NVIDIA/skillspector.git@939da7d41eed4282e4d8217fe2254c69f690027e" \
            skillspector scan "skills/${{ matrix.skill }}" \
              --no-llm --format markdown --output "$report"
          scan_code=$?
          set -e

          echo "----- SkillSpector report: ${{ matrix.skill }} -----"
          cat "$report" 2>/dev/null || echo "(no report produced)"

          # Classify findings for the summary only; capture the gate exit but
          # never propagate it.
          set +e
          gate_out="$(uv run .github/scripts/skillspector_gate.py \
            --report "$report" \
            --skill "${{ matrix.skill }}" \
            --allowlist .github/skillspector-allow.yml 2>&1)"
          gate_code=$?
          set -e
          echo "$gate_out"

          {
            echo "## SkillSpector (advisory): \`${{ matrix.skill }}\`"
            echo
            if [ "$scan_code" = "2" ]; then
              echo "> [!WARNING]"
              echo "> SkillSpector itself errored (exit code 2) while scanning this skill."
              echo
            fi
            if [ "$gate_code" = "0" ]; then
              echo "No un-allowlisted HIGH/CRITICAL findings (advisory)."
            else
              echo "> [!NOTE]"
              echo "> Un-allowlisted HIGH/CRITICAL finding(s) present. Advisory only — this does **not** block merges. Review and either fix or add a justified entry to \`.github/skillspector-allow.yml\`."
            fi
            echo
            echo "<details><summary>Gate classification</summary>"
            echo
            echo '```'
            echo "$gate_out"
            echo '```'
            echo
            echo "</details>"
            echo
            echo "<details><summary>Full SkillSpector report</summary>"
            echo
            echo '```markdown'
            cat "$report" 2>/dev/null || echo "(no report produced)"
            echo '```'
            echo
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

          # Advisory: never fail the workflow on findings.
          exit 0

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skillspector-report-${{ matrix.skill }}
          path: reports/${{ matrix.skill }}.md
          if-no-files-found: warn
