name: behavioral

# Behavioral tests run a real agent against a skill and grade what it did (see
# eval/behavioral/). They cost real API tokens and, for some skills, install
# and exercise local models. The design:
#
#   * selective -- only the skills whose folder or test changed are run (the
#     whole suite runs when the shared harness changes). See
#     .github/scripts/select_behavioral.py.
#   * required when relevant -- when a PR changes a skill or test that maps to a
#     behavioral test, the `behavioral` gate FAILS until the tests pass. A PR
#     that touches nothing testable passes neutrally.
#   * dispatchable -- run any subset by hand from the Actions tab.
#
# Shape mirrors validate.yml: discover -> matrix -> single aggregate gate, so
# branch protection can require just the `behavioral` check.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "skills/**"
      - "eval/behavioral/**"
      - "eval/claude_eval.py"
      - ".github/workflows/behavioral.yml"
      - ".github/scripts/select_behavioral.py"
  workflow_dispatch:
    inputs:
      skills:
        description: "Comma-separated skill names to test (blank = every skill that has a behavioral test)."
        required: false
        default: ""

concurrency:
  group: behavioral-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Decide which skills the change affects. This is secret-free (just git diff +
  # a Python mapping). Its `any` output drives whether the behavioral job runs
  # and whether the gate has anything to enforce for this PR.
  discover:
    name: Select behavioral tests
    runs-on: ubuntu-latest
    outputs:
      # Skills that run on the strix_halo runners (everything except the
      # Instinct skill, which needs dedicated MI300X hardware).
      strix_skills: ${{ steps.select.outputs.strix_skills }}
      strix_any: ${{ steps.select.outputs.strix_any }}
      # Whether serving-llms-on-instinct is in scope for this run.
      instinct: ${{ steps.select.outputs.instinct }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          # Need the merge base so `git diff` can see what the PR changed.
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Select skills
        id: select
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.skills }}" ]; then
              skills=$(uv run .github/scripts/select_behavioral.py --names "${{ github.event.inputs.skills }}")
            else
              skills=$(uv run .github/scripts/select_behavioral.py --all)
            fi
          else
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            skills=$(git diff --name-only "$base" "$head" \
              | uv run .github/scripts/select_behavioral.py --changed)
          fi
          echo "Selected skills: $skills"

          # serving-llms-on-instinct serves models on AMD Instinct GPUs, so it
          # must run on the MI300X runner rather than the strix_halo ones.
          # Split it out into its own list/flag; everything else stays on the
          # existing strix_halo matrix.
          instinct_name="serving-llms-on-instinct"
          strix=$(printf '%s' "$skills" | python3 -c \
            "import sys,json;n='$instinct_name';print(json.dumps([s for s in json.load(sys.stdin) if s!=n]))")
          has_instinct=$(printf '%s' "$skills" | python3 -c \
            "import sys,json;n='$instinct_name';print('true' if n in json.load(sys.stdin) else 'false')")

          echo "strix_skills=$strix"
          echo "instinct=$has_instinct"
          echo "strix_skills=$strix" >> "$GITHUB_OUTPUT"
          echo "instinct=$has_instinct" >> "$GITHUB_OUTPUT"
          if [ "$strix" = "[]" ]; then
            echo "strix_any=false" >> "$GITHUB_OUTPUT"
          else
            echo "strix_any=true" >> "$GITHUB_OUTPUT"
          fi

  behavioral:
    name: Behavioral (${{ matrix.skill }} on ${{ matrix.os }})
    needs: discover
    # Run whenever the change affects a strix_halo-testable skill.
    if: needs.discover.outputs.strix_any == 'true'
    # Self-hosted Strix Halo runners. The OS label (Linux / Windows) comes from
    # the matrix below so each skill is exercised on both platforms.
    runs-on: [self-hosted, strix_halo, "${{ matrix.os }}"]
    # Behavioral runs install local models and can take a while; cap it so a
    # hung agent or stalled model pull fails the job instead of burning minutes.
    timeout-minutes: 45
    strategy:
      # One skill / OS failing should not hide the others' results.
      fail-fast: false
      matrix:
        skill: ${{ fromJson(needs.discover.outputs.strix_skills) }}
        os: [Linux, Windows]
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ORCHESTR_API_KEY }}
      ANTHROPIC_BASE_URL: https://llm-api.amd.com/Anthropic
      ANTHROPIC_CUSTOM_HEADERS: |
        Ocp-Apim-Subscription-Key: ${{ secrets.ORCHESTR_API_KEY }}
        user: a1_ucicd
      # Lets the harness default to this skill if a test relies on the env.
      BEHAVIORAL_SKILL: ${{ matrix.skill }}
      # Model pin: opus only. The harness also enforces this under CI.
      BEHAVIORAL_MODEL: opus
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install the claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install behavioral test dependencies
        run: pip install -r eval/behavioral/requirements.txt

      - name: Run behavioral test for ${{ matrix.skill }} (Linux)
        if: matrix.os == 'Linux'
        working-directory: eval/behavioral
        shell: bash
        run: |
          set -euo pipefail
          test_file="../../skills/${{ matrix.skill }}/evals/evals.py"
          echo "Running $test_file"
          python -m pytest -c pytest.ini -p conftest "$test_file"

      - name: Run behavioral test for ${{ matrix.skill }} (Windows)
        if: matrix.os == 'Windows'
        working-directory: eval/behavioral
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $skill = "${{ matrix.skill }}"
          $test_file = "../../skills/$skill/evals/evals.py"
          Write-Host "Running $test_file"
          python -m pytest -c pytest.ini -p conftest $test_file

  # serving-llms-on-instinct actually serves a model on an AMD Instinct GPU, so
  # it can't run on the strix_halo runners above. It gets its own job on the
  # self-hosted MI300X runner. Linux-only (ROCm + Docker); no Windows leg.
  behavioral-instinct:
    name: Behavioral (serving-llms-on-instinct on MI300X)
    needs: discover
    if: needs.discover.outputs.instinct == 'true'
    runs-on: [self-hosted, Linux, X64, mi300x, gpu, rocm]
    timeout-minutes: 45
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ORCHESTR_API_KEY }}
      ANTHROPIC_BASE_URL: https://llm-api.amd.com/Anthropic
      ANTHROPIC_CUSTOM_HEADERS: |
        Ocp-Apim-Subscription-Key: ${{ secrets.ORCHESTR_API_KEY }}
        user: a1_ucicd
      BEHAVIORAL_SKILL: serving-llms-on-instinct
      # Model pin: opus only. The harness also enforces this under CI.
      BEHAVIORAL_MODEL: opus
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install the claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Install behavioral test dependencies
        run: pip install -r eval/behavioral/requirements.txt

      - name: Run behavioral test for serving-llms-on-instinct
        working-directory: eval/behavioral
        shell: bash
        run: |
          set -euo pipefail
          test_file="../../skills/serving-llms-on-instinct/evals/evals.py"
          echo "Running $test_file"
          python -m pytest -c pytest.ini -p conftest "$test_file"

  # Single aggregate gate. Mark THIS check required in branch protection.
  #
  #   * nothing testable changed -> pass (neutral).
  #   * testable change          -> pass iff the behavioral job passed.
  behavioral-gate:
    name: behavioral
    needs: [discover, behavioral, behavioral-instinct]
    if: always()
    runs-on: ubuntu-latest
    env:
      DISCOVER_RESULT: ${{ needs.discover.result }}
      BEHAVIORAL_RESULT: ${{ needs.behavioral.result }}
      INSTINCT_RESULT: ${{ needs.behavioral-instinct.result }}
      STRIX_ANY: ${{ needs.discover.outputs.strix_any }}
      INSTINCT_AFFECTED: ${{ needs.discover.outputs.instinct }}
      STRIX_SKILLS: ${{ needs.discover.outputs.strix_skills }}
    steps:
      - name: Verify behavioral results
        run: |
          echo "discover:            $DISCOVER_RESULT"
          echo "behavioral (strix):  $BEHAVIORAL_RESULT"
          echo "behavioral-instinct: $INSTINCT_RESULT"
          echo "strix affected:      $STRIX_ANY ($STRIX_SKILLS)"
          echo "instinct affected:   $INSTINCT_AFFECTED"

          # If discovery itself failed, surface that rather than guessing.
          if [ "$DISCOVER_RESULT" != "success" ]; then
            echo "The discover job did not succeed ($DISCOVER_RESULT)." >&2
            exit 1
          fi

          # No skill or behavioral test changed: nothing to gate on.
          if [ "$STRIX_ANY" != "true" ] && [ "$INSTINCT_AFFECTED" != "true" ]; then
            echo "No behavioral tests affected by this change."
            exit 0
          fi

          # Each affected leg must have passed. A leg that wasn't triggered is
          # 'skipped', which we ignore.
          failed=0
          if [ "$STRIX_ANY" = "true" ] && [ "$BEHAVIORAL_RESULT" != "success" ]; then
            echo "Strix behavioral tests did not pass ($BEHAVIORAL_RESULT)." >&2
            failed=1
          fi
          if [ "$INSTINCT_AFFECTED" = "true" ] && [ "$INSTINCT_RESULT" != "success" ]; then
            echo "Instinct behavioral test did not pass ($INSTINCT_RESULT)." >&2
            failed=1
          fi
          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
          echo "All affected behavioral tests passed."
          exit 0
