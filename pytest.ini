[pytest]
# Behavioral tests are slow (they run a real agent + local models) and noisy,
# so default to showing prints. They live per-skill at
# skills/<skill>/evals/evals.py; collect only those. Every skill's file has the
# same basename (evals.py), so use importlib import mode to avoid the
# basename-collision that the default "prepend" mode hits without __init__.py.
addopts = -s -ra --import-mode=importlib
testpaths = skills
python_files = evals.py
python_functions = test_*
